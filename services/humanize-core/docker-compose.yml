services:
  humanize-core:
    build: .
    env_file:
      - .env
    expose:
      - "8000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - humanize-core
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

