services:
  humanize-core:
    build: .
    env_file:
      - .env
    environment:
      HUMANIZE_JOB_STORE_PATH: /data/humanize_jobs.sqlite3
    expose:
      - "8000"
    volumes:
      - humanize-core-data:/data
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    depends_on:
      - humanize-core
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped

volumes:
  humanize-core-data:
